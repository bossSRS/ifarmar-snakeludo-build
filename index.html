<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>Unity Web Player | ifarmer-snakeludo</title>
  <style>
    body {
      text-align: center;
      padding: 0;
      border: 0;
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #231F20;
      /* Custom Background Image */
      background-image: url('TemplateData/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      background: transparent !important;
    }

    /* Loading Screen Overlay */
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.4);
      /* Dark semi-transparent overlay */
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #loading-gif {
      width: 150px;
      /* Adjust size based on the specific gif */
      height: auto;
      margin-bottom: 20px;
    }

  </style>
</head>

<body>
  <div id="game-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-screen">
      <!-- Make sure to place your GIF as TemplateData/loading.gif -->
      <img id="loading-gif" src="TemplateData/loading.gif" alt="Loading..." onerror="this.style.display='none'">
    </div>
  </div>

  <script src="Build/ifarmar-snakeludo.loader.js"></script>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    var loadingScreen = document.querySelector("#loading-screen");

    // Mobile device check logic matching original
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      document.body.style.textAlign = "left";
    }

    var buildUrl = "Build";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/ifarmar-snakeludo.data.unityweb",
      frameworkUrl: buildUrl + "/ifarmar-snakeludo.framework.js.unityweb",
      codeUrl: buildUrl + "/ifarmar-snakeludo.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "InceptionStudio",
      productName: "ifarmer-snakeludo",
      productVersion: "1.0",
      // matchWebGLToCanvasSize: false, 
      // devicePixelRatio: 1, 
    };

    createUnityInstance(canvas, config, (progress) => {
      // Intentionally left blank, using only loading.gif indicator
    }).then((unityInstance) => {
      // Hide loading screen when game is fully instantiated
      loadingScreen.style.opacity = "0";
      setTimeout(() => {
        loadingScreen.style.display = "none";
      }, 500);
    }).catch((message) => {
      alert(message);
    });
  </script>
</body>

</html>
